{% extends "base.html" %}
{% block title %}New Leave Type{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:1100px">
  <div class="mb-4">
    <a href="{{ url_for('leave_types') }}" class="text-decoration-none text-muted small">
      <i class="fas fa-arrow-left me-1"></i> Back to Leave Types
    </a>
    <h2 class="fw-bold mt-2 mb-0">New Leave Type</h2>
    <p class="text-muted">Balances will be auto-created for all active employees.</p>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-4">
          <label class="form-label fw-medium">Leave Type Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control form-control-lg"
                 placeholder="e.g. Casual Leave, Sick Leave"
                 value="{{ request.form.get('name', '') }}" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-medium">Total Allowed Days / Year <span class="text-danger">*</span></label>
          <input type="number" name="total_days" class="form-control form-control-lg"
                 placeholder="e.g. 12" min="0.5" step="0.5"
                 value="{{ request.form.get('total_days', '') }}" required>
          <div class="form-text">Half-day increments supported (e.g., 7.5)</div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-save me-1"></i> Create Leave Type
          </button>
          <a href="{{ url_for('leave_types') }}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
