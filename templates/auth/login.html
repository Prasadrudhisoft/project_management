<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Project Manager</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #212529;
            background: url('/static/images/login.jpg') center center / cover no-repeat fixed;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            margin-right: -15px;
            margin-left: -15px;
        }

        .justify-content-center {
            justify-content: center;
        }

        .col-md-6 {
            flex: 0 0 50%;
            max-width: 50%;
            padding: 0 15px;
        }

        .col-lg-4 {
            flex: 0 0 33.333333%;
            max-width: 33.333333%;
        }

        .mt-5 {
            margin-top: 0 !important;
        }

        .mt-3 {
            margin-top: 0 !important;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .mb-0 {
            margin-bottom: 0;
        }

        .me-2 {
            margin-right: 0.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            transform: translateZ(0);
            will-change: transform, box-shadow;
        }

        .card:hover {
            transform: translateY(-5px) translateZ(0);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .shadow {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            padding: 1.5rem 1rem;
            background: linear-gradient(135deg, #2e3192, #4f46e5);
            border-bottom: none;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: translateX(-100%) translateY(-100%) rotate(45deg) translateZ(0);
        }

        .card-body {
            padding: 2rem 1.5rem;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 0 0 0 0;
        }

        .card-footer {
            padding: 1rem 1.5rem;
            background: #ffffff;
            border-top: 1px solid rgba(79, 70, 229, 0.1);
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.03);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            color: #374151;
        }

        .card-footer p {
            color: #374151;
            margin: 0;
            font-size: 0.9rem;
        }

        .text-white {
            color: #fff !important;
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: #6c757d;
        }

        h4,
        h6 {
            margin: 0;
            position: relative;
            z-index: 1;
        }

        .form-label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #495057;
            transition: color 0.2s ease;
        }

        .form-control {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            color: #212529;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #e9ecef;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform: translateZ(0);
            will-change: border-color, box-shadow, transform;
        }

        input[type="password"] {
            font-family: "Courier New", monospace !important;
            letter-spacing: 0.2em !important;
            font-size: 1.2rem !important;
            font-weight: 900 !important;
            color: #000000 !important;
            text-shadow: 0 0 0 #000000 !important;
            background-color: rgba(255, 255, 255, 1) !important;
            position: relative;
            z-index: 2;
        }

        input[type="password"]::-webkit-input-placeholder {
            color: #6c757d;
            letter-spacing: normal;
            font-weight: normal;
            font-family: "Segoe UI", sans-serif;
            font-size: 1rem;
        }

        input[type="password"]::-moz-placeholder {
            color: #6c757d;
            letter-spacing: normal;
            font-weight: normal;
            font-family: "Segoe UI", sans-serif;
            font-size: 1rem;
        }

        input[type="password"]::placeholder {
            color: #6c757d;
            letter-spacing: normal;
            font-weight: normal;
            font-family: "Segoe UI", sans-serif;
            font-size: 1rem;
        }

        input[type="password"]:focus {
            color: #000000 !important;
            background-color: #ffffff !important;
            text-shadow: none !important;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .password-input-group {
            position: relative;
        }

        .password-input-group .form-control {
            padding-right: 3rem;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 6px;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease, background-color 0.2s ease;
            z-index: 4;
            outline: none;
        }

        .password-toggle:hover {
            color: #4f46e5;
            background-color: rgba(79, 70, 229, 0.08);
        }

        .password-toggle:active,
        .password-toggle:focus {
            color: #4f46e5;
            background-color: rgba(79, 70, 229, 0.12);
            outline: none;
            box-shadow: none;
        }

        .password-toggle.password-visible {
            color: #4f46e5;
        }

        .btn {
            display: inline-block;
            font-weight: 600;
            line-height: 1.5;
            color: #212529;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
            will-change: transform, box-shadow;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.4s ease;
            transform: translateZ(0);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, #2e3192, #4f46e5);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px) translateZ(0);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.6);
        }

        .btn-primary:active {
            transform: translateY(-1px) translateZ(0);
        }

        .btn-secondary {
            color: #fff;
            background: #2e3192;
            box-shadow: 0 4px 15px rgba(46, 49, 146, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px) translateZ(0);
            box-shadow: 0 8px 25px rgba(46, 49, 146, 0.6);
        }

        .w-100 {
            width: 100%;
        }

        .alert {
            position: relative;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            border: none;
            border-radius: 12px;
            animation: slideInDown 0.4s ease;
            transform: translateZ(0);
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px) translateZ(0);
            }

            to {
                opacity: 1;
                transform: translateY(0) translateZ(0);
            }
        }

        .alert-danger {
            color: #721c24;
            background: rgba(248, 215, 218, 0.9);
            border-left: 4px solid #dc3545;
        }

        .alert-success {
            color: #0f5132;
            background: rgba(209, 237, 221, 0.9);
            border-left: 4px solid #198754;
        }

        .alert-info {
            color: #055160;
            background: rgba(209, 236, 241, 0.9);
            border-left: 4px solid #0dcaf0;
        }

        a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        a::before {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 50%;
            background: linear-gradient(90deg, #2e3192, #4f46e5);
            transition: all 0.2s ease;
        }

        a:hover {
            color: #2e3192;
            text-decoration: none;
            transform: translateY(-1px);
        }

        a:hover::before {
            width: 100%;
            left: 0;
        }

        .bi::before {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: -0.125em;
        }

        .bi-box-arrow-in-right::before {
            content: "→";
        }

        .bi-house::before {
            content: "🏠";
        }

        .eye-svg {
            width: 18px;
            height: 18px;
            display: block;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s ease;
        }

        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            margin: auto;
            border: 2px solid transparent;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            transform: translateZ(0);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg) translateZ(0);
            }

            100% {
                transform: rotate(360deg) translateZ(0);
            }
        }

        .success-animation {
            animation: pulse 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translateZ(0);
            }

            50% {
                transform: scale(1.03) translateZ(0);
            }

            100% {
                transform: scale(1) translateZ(0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0) translateZ(0);
            }

            25% {
                transform: translateX(-5px) translateZ(0);
                border-color: #e74c3c !important;
            }

            75% {
                transform: translateX(5px) translateZ(0);
                border-color: #e74c3c !important;
            }
        }

        .back-home {
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px) translateZ(0);
            }

            to {
                opacity: 1;
                transform: translateY(0) translateZ(0);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 575.98px) {
            .container {
                padding: 0 10px;
            }

            .col-md-6,
            .col-lg-4 {
                flex: 0 0 100%;
                max-width: 100%;
                padding: 0 5px;
            }

            .card {
                margin: 0.5rem 0;
                border-radius: 15px;
            }

            .card-body {
                padding: 1.5rem 1rem;
            }

            .card-header {
                padding: 1rem 0.75rem;
                border-radius: 15px 15px 0 0;
            }

            .card-header h4 {
                font-size: 1.1rem;
            }

            .form-control {
                padding: 0.6rem 0.8rem;
                font-size: 16px;
            }

            input[type="password"] {
                font-size: 18px !important;
                letter-spacing: 0.25em !important;
                font-weight: 900 !important;
                color: #000000 !important;
                background-color: #ffffff !important;
            }

            .password-input-group .form-control {
                padding-right: 2.8rem;
            }

            .password-toggle {
                right: 0.8rem;
                width: 1.8rem;
                height: 1.8rem;
                font-size: 1rem;
            }

            .floating-label {
                font-size: 0.9rem;
                left: 0.8rem;
            }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.95rem;
            }
        }

        @media (min-width: 576px) and (max-width: 767.98px) {

            .col-md-6,
            .col-lg-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .card {
                margin: 0 1rem;
                max-width: 450px;
                margin-left: auto;
                margin-right: auto;
            }

            .form-control {
                font-size: 16px;
            }

            input[type="password"] {
                font-size: 18px !important;
                letter-spacing: 0.2em !important;
                font-weight: 900 !important;
                color: #000000 !important;
                background-color: #ffffff !important;
            }
        }

        @media (min-width: 768px) and (max-width: 991.98px) {
            .col-md-6 {
                flex: 0 0 75%;
                max-width: 75%;
            }

            .col-lg-4 {
                flex: 0 0 60%;
                max-width: 60%;
            }

            .card {
                max-width: 500px;
            }
        }

        @media (min-width: 992px) and (max-width: 1199.98px) {
            .col-lg-4 {
                flex: 0 0 40%;
                max-width: 40%;
            }
        }

        @media (min-width: 1200px) {
            .col-lg-4 {
                flex: 0 0 33.333333%;
                max-width: 33.333333%;
            }

            .container {
                max-width: 1400px;
            }

            .card {
                max-width: 420px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: url('/static/images/login.jpg') center center / cover no-repeat fixed !important;
                color: #212529;
            }

            .card {
                background: rgba(255, 255, 255, 0.97) !important;
                color: #212529 !important;
            }

            .card-header {
                background: linear-gradient(135deg, #2e3192, #4f46e5) !important;
                color: #fff !important;
            }

            .card-body {
                background: rgba(255, 255, 255, 0.97) !important;
                color: #212529 !important;
            }

            .card-footer {
                background: rgba(255, 255, 255, 0.97) !important;
                color: #212529 !important;
            }

            .form-control {
                background-color: #ffffff !important;
                color: #212529 !important;
                border-color: #e9ecef !important;
            }

            .form-label {
                color: #495057 !important;
            }

            input[type="password"] {
                color: #000000 !important;
                background-color: #ffffff !important;
            }

            a {
                color: #4f46e5 !important;
            }

            .text-muted {
                color: #6c757d !important;
            }
        }

        .btn-back-home {
            color: #fff !important;
            background: #2e3192;
            box-shadow: 0 4px 15px rgba(46, 49, 146, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.8rem;
            height: 2.8rem;
            padding: 0;
            border-radius: 50%;
            font-size: 1.3rem;
            line-height: 1;
        }

        .btn-back-home::before {
            display: none !important;
        }

        .btn-back-home:hover {
            color: #fff !important;
            background: #3d42b8;
            box-shadow: 0 8px 25px rgba(46, 49, 146, 0.6);
            transform: translateY(-2px) !important;
            text-decoration: none !important;
        }

        .btn-back-home:active,
        .btn-back-home:focus {
            color: #fff !important;
            background: #252875;
            box-shadow: 0 2px 8px rgba(46, 49, 146, 0.4);
            transform: translateY(0px) !important;
            outline: none;
            text-decoration: none !important;
        }

        /* Reduced motion preference */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="container" style="position:relative;z-index:2;margin-bottom:0.5rem;">
        {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' if category == 'success' else 'info' }}"
            id="flash-message">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- Back to Home - Fixed Top Left -->
    <div style="position: fixed; top: 1rem; left: 1rem; z-index: 10;">
        <a href="{{ url_for('landing') }}" class="btn btn-back-home">
            ←
        </a>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <!-- Back to Home Button moved to top left -->
                <div class="card shadow">
                    <div class="card-header text-center text-white">
                        <h4><i class="bi bi-box-arrow-in-right me-2"></i>Project Management Login</h4>
                        <!-- <small style="opacity: 0.9;">Manage your projects efficiently</small> -->
                    </div>
                    <div class="card-body">
                        <form method="POST" id="loginForm">
                            <div class="input-group">
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="Email Address" required>
                            </div>
                            <div class="input-group password-input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Password" required>
                                <button type="button" class="password-toggle" id="passwordToggle"
                                    aria-label="Toggle password visibility">
                                    <!-- Eye Open SVG -->
                                    <svg id="eyeOpen" class="eye-svg" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>
                                    <!-- Eye Closed SVG -->
                                    <svg id="eyeClosed" class="eye-svg" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg" style="display:none;">
                                        <path
                                            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                                        <path
                                            d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                                        <line x1="1" y1="1" x2="23" y2="23" />
                                    </svg>
                                </button>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                <span id="btnText">Login</span>
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <p class="mb-0">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isAnimating = false;
        let animationFrame;

        function initializePasswordToggle() {
            const passwordInput = document.getElementById('password');
            const passwordToggle = document.getElementById('passwordToggle');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');

            passwordToggle.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();

                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';

                if (isPassword) {
                    eyeOpen.style.display = 'none';
                    eyeClosed.style.display = 'block';
                    passwordToggle.classList.add('password-visible');
                    passwordToggle.setAttribute('aria-label', 'Hide password');
                } else {
                    eyeOpen.style.display = 'block';
                    eyeClosed.style.display = 'none';
                    passwordToggle.classList.remove('password-visible');
                    passwordToggle.setAttribute('aria-label', 'Show password');
                }

                passwordInput.focus();
            });

            passwordToggle.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

        }

        document.addEventListener('DOMContentLoaded', function () {
            const flashMessage = document.getElementById('flash-message');
            if (flashMessage) {
                setTimeout(function () {
                    flashMessage.style.transform = 'translateY(-20px)';
                    flashMessage.style.opacity = '0';
                    setTimeout(function () {
                        flashMessage.remove();
                    }, 300);
                }, 5000);
            }

            initializeOptimizedFeatures();
            initializePasswordToggle();
        });

        function fillCredentials(email, password) {
            const emailField = document.getElementById('email');
            const passwordField = document.getElementById('password');

            emailField.value = '';
            passwordField.value = '';

            let emailIndex = 0;
            let passwordIndex = 0;

            function typeEmail() {
                if (emailIndex < email.length) {
                    emailField.value += email[emailIndex];
                    emailIndex++;
                    setTimeout(typeEmail, 40);
                } else {
                    typePassword();
                }
            }

            function typePassword() {
                if (passwordIndex < password.length) {
                    passwordField.value += password[passwordIndex];
                    passwordIndex++;
                    setTimeout(typePassword, 80);
                } else {
                    emailField.classList.add('success-animation');
                    passwordField.classList.add('success-animation');
                    setTimeout(() => {
                        emailField.classList.remove('success-animation');
                        passwordField.classList.remove('success-animation');
                    }, 500);
                }
            }

            typeEmail();
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            if (!email || !password) {
                e.preventDefault();

                if (!email) {
                    const emailField = document.getElementById('email');
                    emailField.style.animation = 'shake 0.4s ease-in-out';
                    setTimeout(() => { emailField.style.animation = ''; }, 400);
                }
                if (!password) {
                    const passwordField = document.getElementById('password');
                    passwordField.style.animation = 'shake 0.4s ease-in-out';
                    setTimeout(() => { passwordField.style.animation = ''; }, 400);
                }
                return;
            }

            submitBtn.classList.add('btn-loading');
            btnText.textContent = 'Logging in...';
            submitBtn.disabled = true;

            setTimeout(() => {
                if (submitBtn.classList.contains('btn-loading')) {
                    submitBtn.classList.remove('btn-loading');
                    btnText.textContent = 'Login';
                    submitBtn.disabled = false;
                }
            }, 10000);
        });

        function initializeOptimizedFeatures() {
            const formControls = document.querySelectorAll('.form-control');

            formControls.forEach(input => {
                let inputTimeout;
                input.addEventListener('input', function () {
                    clearTimeout(inputTimeout);
                    inputTimeout = setTimeout(() => {
                        if (this.value) {
                            this.style.borderColor = '#4f46e5';
                        } else {
                            this.style.borderColor = '';
                        }
                    }, 100);
                }, { passive: true });
            });

            if (window.innerWidth > 767) {
                const card = document.querySelector('.card');
                let hoverTimeout;

                card.addEventListener('mouseenter', function () {
                    clearTimeout(hoverTimeout);
                    this.style.transform = 'translateY(-5px)';
                    this.style.boxShadow = '0 25px 50px rgba(79, 70, 229, 0.15)';
                }, { passive: true });

                card.addEventListener('mouseleave', function () {
                    hoverTimeout = setTimeout(() => {
                        this.style.transform = 'translateY(0)';
                        this.style.boxShadow = '0 15px 35px rgba(0,0,0,0.1)';
                    }, 50);
                }, { passive: true });
            }
        }

        let resizeTimeout;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleResize, 250);
        }, { passive: true });

        function handleResize() {
            if (window.innerWidth <= 767) {
                document.documentElement.style.setProperty('--animation-duration', '0.2s');
            } else {
                document.documentElement.style.setProperty('--animation-duration', '0.3s');
            }
        }

        window.addEventListener('orientationchange', function () {
            setTimeout(() => { handleResize(); }, 300);
        }, { passive: true });

        document.addEventListener('visibilitychange', function () {
            const body = document.body;
            if (document.hidden) {
                body.style.animationPlayState = 'paused';
                const style = document.createElement('style');
                style.id = 'pause-animations';
                style.textContent = '*, *::before, *::after { animation-play-state: paused !important; }';
                document.head.appendChild(style);
            } else {
                body.style.animationPlayState = 'running';
                const pauseStyle = document.getElementById('pause-animations');
                if (pauseStyle) { pauseStyle.remove(); }
            }
        }, { passive: true });

        function validateInput(input) {
            const value = input.value.trim();

            if (input.type === 'email') {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (value && !emailRegex.test(value)) {
                    input.style.borderColor = '#e74c3c';
                    return false;
                } else if (value && emailRegex.test(value)) {
                    input.style.borderColor = '#27ae60';
                    return true;
                }
            }

            if (input.type === 'password' || (input.type === 'text' && input.id === 'password')) {
                if (value && value.length < 3) {
                    input.style.borderColor = '#f39c12';
                    return false;
                } else if (value && value.length >= 3) {
                    input.style.borderColor = '#27ae60';
                    return true;
                }
            }

            if (!value) { input.style.borderColor = ''; }
            return true;
        }

        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('input', function () { validateInput(this); });
            input.addEventListener('blur', function () { validateInput(this); });
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement.tagName === 'INPUT') {
                    const form = activeElement.closest('form');
                    const inputs = form.querySelectorAll('input[required]');
                    const currentIndex = Array.from(inputs).indexOf(activeElement);

                    if (currentIndex < inputs.length - 1) {
                        e.preventDefault();
                        inputs[currentIndex + 1].focus();
                    } else {
                        form.querySelector('button[type="submit"]').focus();
                    }
                }
            }
        });

        function improveAccessibility() {
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Tab') { document.body.classList.add('keyboard-nav'); }
            });

            document.addEventListener('mousedown', function () {
                document.body.classList.remove('keyboard-nav');
            });
        }

        document.addEventListener('DOMContentLoaded', improveAccessibility);

        if ('ontouchstart' in window) {
            document.body.classList.add('touch-device');

            document.querySelectorAll('.btn, .password-toggle').forEach(element => {
                element.addEventListener('touchstart', function () {
                    this.classList.add('touch-active');
                }, { passive: true });

                element.addEventListener('touchend', function () {
                    setTimeout(() => { this.classList.remove('touch-active'); }, 150);
                }, { passive: true });
            });
        }

        window.addEventListener('error', function (e) {
            if (e.message.includes('animation') || e.message.includes('transform')) {
                console.warn('Animation error detected, falling back to basic styles');
                document.body.classList.add('no-animations');
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            document.body.classList.add('loaded');

            if ('scrollBehavior' in document.documentElement.style) {
                document.documentElement.style.scrollBehavior = 'smooth';
            }

            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('dark-theme');
            }

            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
                    if (e.matches) {
                        document.body.classList.add('dark-theme');
                    } else {
                        document.body.classList.remove('dark-theme');
                    }
                });
            }
        });

        window.addEventListener('beforeunload', function () {
            clearTimeout(resizeTimeout);
            if (animationFrame) { cancelAnimationFrame(animationFrame); }
        }, { passive: true });
    </script>
</body>
